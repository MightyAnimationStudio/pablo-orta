<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pablo Orta — Contact</title>
  <meta name="description" content="Get in touch with Pablo Orta — award-winning writer, director and editor from Guadalajara, México.">
  <meta property="og:title" content="Pablo Orta — Contact">
  <meta property="og:description" content="Get in touch with Pablo Orta.">
  <meta name="author" content="Pablo Orta">
  <meta name="robots" content="index, follow">
  <meta property="og:site_name" content="Pablo Orta">
  <meta property="og:locale" content="en_US">
  <meta name="twitter:card" content="summary">
  <meta property="og:url" content="https://pablo-orta.com/contact">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://pablo-orta.com/contact">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <header>
    <a href="/" class="brand">
      <span class="brand-name">Pablo Orta</span>
      <span class="brand-sub">Director &amp; Editor</span>
    </a>
    <nav>
      <ul>
        <li><a href="./showreel">Showreel</a></li>
        <li><a href="./work">Work</a></li>
        <li><a href="./commercial">Commercial</a></li>
        <li><a href="./about">About</a></li>
      </ul>
    </nav>
  </header>

  <div class="contact-page">

    <!-- Left: info panel -->
    <div class="contact-page-info">
      <p class="contact-page-eyebrow">Contact</p>
      <h1 class="contact-page-heading">Get in touch</h1>
      <p class="contact-page-text">Open to collaborations, commissions and general enquiries.</p>
      <a href="mailto:pabloaortaz@gmail.com" class="contact-page-email">pabloaortaz@gmail.com</a>
    </div>

    <!-- Right: form panel -->
    <div class="contact-page-form">
      <form id="contact-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@email.com" required>
          </div>
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" placeholder="What's this about?">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" rows="6" placeholder="Your message…" required></textarea>
        </div>
        <button type="submit" class="form-submit">Send message &rarr;</button>
      </form>
    </div>

  </div>

  <footer>&copy; 2026 Pablo Orta &nbsp;&middot;&nbsp; <a href="./contact">Contact</a></footer>

  <script>
    const page = window.location.pathname.split('/').pop().replace('.html', '') || 'index';
    document.querySelectorAll('nav a').forEach(a => {
      const href = a.getAttribute('href').replace('./', '').replace('.html', '');
      if (href === page) a.classList.add('current');
    });

    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const name    = document.getElementById('name').value.trim();
      const email   = document.getElementById('email').value.trim();
      const subject = document.getElementById('subject').value.trim() || 'Message from pablo-orta.com';
      const message = document.getElementById('message').value.trim();
      if (!name || !email || !message) { alert('Please fill in your name, email and message.'); return; }
      const body = `Name: ${name}\nEmail: ${email}\n\n${message}`;
      window.location.href = 'mailto:pabloaortaz@gmail.com?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
    });
  </script>

</body>
</html>
